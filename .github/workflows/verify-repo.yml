name: verify-repo

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
      - "feature/**"
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Determine reference evidence range
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "pull_request") {
            "USE_DIFF_RANGE=1" >> $env:GITHUB_ENV
            "REFERENCE_BASE_REF=${{ github.event.pull_request.base.sha }}" >> $env:GITHUB_ENV
            "REFERENCE_HEAD_REF=${{ github.event.pull_request.head.sha }}" >> $env:GITHUB_ENV
            exit 0
          }

          if ("${{ github.event_name }}" -eq "push" -and "${{ github.event.before }}" -and "${{ github.event.before }}" -ne "0000000000000000000000000000000000000000") {
            "USE_DIFF_RANGE=1" >> $env:GITHUB_ENV
            "REFERENCE_BASE_REF=${{ github.event.before }}" >> $env:GITHUB_ENV
            "REFERENCE_HEAD_REF=${{ github.sha }}" >> $env:GITHUB_ENV
            exit 0
          }

          "USE_DIFF_RANGE=0" >> $env:GITHUB_ENV

      - name: Verify repository
        shell: pwsh
        run: |
          if ($env:USE_DIFF_RANGE -eq "1") {
            .\scripts\verify-repo.ps1 -ReferenceEvidenceBaseRef $env:REFERENCE_BASE_REF -ReferenceEvidenceHeadRef $env:REFERENCE_HEAD_REF
          }
          else {
            Write-Host "No reliable diff range available; running repository verification without the diff-range reference gate."
            .\scripts\verify-repo.ps1 -SkipReferenceEvidence
          }
